name: Deploy nateponds.com to Ubuntu Apache

on:
  push:
    branches: ["main"]

concurrency:
  group: nateponds
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify static website structure
        run: |
          test -f index.html
          test -d css
          test -d js
          test -d assets

      - name: Deploy to Apache web root
        run: |
          set -euo pipefail

          ROOT="/mnt/Storage2_New/website-hosting/nateponds-portfolio"

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            ./ "$ROOT/"

          chmod -R u=rwX,go=rX "$ROOT"
