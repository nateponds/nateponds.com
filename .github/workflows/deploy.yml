name: Deploy nateponds.com to Ubuntu Apache

on:
  push:
    branches: ["main"]

concurrency:
  group: nateponds
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify application structure
        run: |
          test -f index.html
          test -f server.js
          test -f vite.config.js
          test -f package.json
          test -f package-lock.json
          test -d src
          test -d assets

      - name: Install, test, and build
        run: |
          set -euo pipefail

          npm ci --ignore-scripts
          npm run check
          test -f dist/index.html

      - name: Deploy to Apache web root
        run: |
          set -euo pipefail

          ROOT="/mnt/Storage2_New/website-hosting/nateponds-portfolio"

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            --exclude "import/" \
            ./ "$ROOT/"

          chmod -R u=rwX,go=rX "$ROOT"

      - name: Install production backend dependencies
        run: |
          set -euo pipefail

          ROOT="/mnt/Storage2_New/website-hosting/nateponds-portfolio"

          cd "$ROOT"
          npm ci --omit=dev --ignore-scripts

      - name: Restart Express API
        run: sudo systemctl restart nateponds-portfolio-api.service

      - name: Purge Cloudflare Cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
